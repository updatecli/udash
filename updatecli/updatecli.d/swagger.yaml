name: Update API Documentation

labels:
  event: release
  monitoring: enabled

pipelineid: "venom"
actions:
  default:
    kind: github/pullrequest
    spec:
      automerge: true
      labels:
        - docs
    scmid: default

scms:
  default:
    kind: github
    spec:
      branch: "{{ .scm.branch }}"
      email: "{{ .scm.email }}"
      owner: "{{ .scm.owner }}"
      repository: "{{ .scm.repository }}"
      user: "{{ .scm.user }}"

targets:
  swagger:
    name: Update API Documentation
    kind: shell
    scmid: default
    spec:
      command: |
        swag init --parseDependencyLevel 1
      changedif:
        kind: file/checksum
        spec:
          files:
            - docs/swagger.yaml
            - docs/swagger.json
            - docs/docs.go
